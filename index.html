<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beckmans Hero 2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="hero">

    <nav class="top-nav">
      <span class="brand nav-fixed">beckmans designhögskola</span>
      <span class="nav-link nav-fixed nav-form">form</span>
      <span class="nav-link nav-fixed nav-mode">mode</span>
      <span class="nav-link nav-fixed nav-vk">visuell kommunikation</span>
      <span class="nav-link nav-fixed nav-evening">kvällskolan</span>
      <span class="nav-link nav-fixed nav-apply">ansök</span>
    </nav>

    <div class="headlines">
      <span class="headline-left">här görs design.</span>
      <span class="headline-right">på riktigt.</span>
    </div>

    <div class="slideshow">
      <div class="slideshow-track" id="slideshow-track">

        <!-- Eliot -->
        <div class="slide slide-large slide-student" data-student="eliot">
          <div class="student-images">
            <img class="student-img" src="assets/images/eliot-1.png" alt="" />
            <img class="student-img" src="assets/images/eliot-2.png" alt="" />
            <img class="student-img" src="assets/images/eliot-3.png" alt="" />
          </div>
          <div class="student-overlay"></div>
          <div class="slide-label label-center-left">
            <div class="label-row"><div class="label-pad"></div><div class="label-content"><span class="label-text">Eliot Axelsson</span></div><div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div></div>
            <div class="label-sep"></div>
            <div class="label-row"><div class="label-pad"></div><div class="label-content"><span class="label-text label-project">Psyk</span></div><div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div></div>
            <div class="label-sep"></div>
            <div class="label-row"><div class="label-pad"></div><div class="label-content"><div class="label-dots"><span class="dot-bar is-active"><span class="dot-fill"></span></span><span class="dot"></span><span class="dot"></span></div></div><div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div></div>
          </div>
        </div>

        <!-- visuell kommunikation -->
        <div class="slide slide-small card-vk">
          <div class="card-top card-brackets">
            <img class="bracket bracket-left" src="assets/vectors/union-stroke.svg" alt="" />
            <div class="bracket-text">
              <span class="bracket-label">visuell<br>kommunikation</span>
              <span class="bracket-hp">180hp</span>
            </div>
            <img class="bracket bracket-right" src="assets/vectors/union-stroke.svg" alt="" />
          </div>
          <div class="card-bottom"><img src="assets/images/image-127.png" alt="" /></div>
        </div>

        <!-- Fanny -->
        <div class="slide slide-small slide-student" data-student="fanny">
          <div class="student-images">
            <img class="student-img" src="assets/images/fanny-1.png" alt="" />
            <img class="student-img" src="assets/images/fanny-2.png" alt="" />
            <img class="student-img" src="assets/images/fanny-3.png" alt="" />
          </div>
          <div class="student-overlay"></div>
          <div class="slide-label label-bottom-left">
            <div class="label-row"><div class="label-pad"></div><div class="label-content"><span class="label-text">Fanny Axnér</span></div><div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div></div>
            <div class="label-sep"></div>
            <div class="label-row"><div class="label-pad"></div><div class="label-content"><span class="label-text label-project">Trip stackable</span></div><div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div></div>
            <div class="label-sep"></div>
            <div class="label-row"><div class="label-pad"></div><div class="label-content"><div class="label-dots"><span class="dot-bar is-active"><span class="dot-fill"></span></span><span class="dot"></span><span class="dot"></span></div></div><div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div></div>
          </div>
        </div>

        <!-- Form oval -->
        <div class="slide slide-small card-form">
          <div class="card-top card-image"><img src="assets/images/ocean-1.png" alt="" /></div>
          <div class="card-bottom card-oval">
            <img class="oval-bg" src="assets/vectors/union.svg" alt="" />
            <div class="oval-text">
              <span class="oval-label">form</span>
              <span class="oval-hp">180hp</span>
            </div>
          </div>
        </div>

        <!-- Hilda -->
        <div class="slide slide-large slide-student" data-student="hilda">
          <div class="student-images">
            <img class="student-img" src="assets/images/hilda-1.png" alt="" />
            <img class="student-img" src="assets/images/hilda-2.png" alt="" />
            <img class="student-img" src="assets/images/hilda-3.png" alt="" />
          </div>
          <div class="student-overlay"></div>
          <div class="slide-label label-top-left">
            <div class="label-row"><div class="label-pad"></div><div class="label-content"><span class="label-text label-name">Hilda Landström Ferm</span></div><div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div></div>
            <div class="label-sep"></div>
            <div class="label-row"><div class="label-pad"></div><div class="label-content"><span class="label-text label-project">Dysmorphia</span></div><div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div></div>
            <div class="label-sep"></div>
            <div class="label-row"><div class="label-pad"></div><div class="label-content"><div class="label-dots"><span class="dot-bar is-active"><span class="dot-fill"></span></span><span class="dot"></span><span class="dot"></span></div></div><div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div></div>
          </div>
        </div>

        <!-- Mode -->
        <div class="slide slide-small card-mode">
          <div class="card-top card-brackets">
            <img class="bracket bracket-left" src="assets/vectors/subtract.svg" alt="" />
            <div class="bracket-text">
              <span class="bracket-label mode-label">mode</span>
              <span class="bracket-hp mode-hp">180hp</span>
            </div>
            <img class="bracket bracket-right" src="assets/vectors/subtract.svg" alt="" />
          </div>
          <div class="card-bottom"><img src="assets/images/image-128.png" alt="" /></div>
        </div>

      </div>
    </div>

  </section>

  <script>
    const STUDENTS = {
      eliot: {
        projects: [
          { title: 'Psyk', name: 'Eliot Axelsson' },
          { title: 'For Sale: Peace Of Mind', name: 'Eliot Axelsson' },
          { title: 'Prisklass Danderyd & Prisklass Malmö', name: 'Eliot Axelsson' },
        ],
      },
      fanny: {
        projects: [
          { title: 'Trip stackable', name: 'Fanny Axnér' },
          { title: 'Stilleben', name: 'Fanny Axnér' },
          { title: 'Otium', name: 'Fanny Axnér' },
        ],
      },
      hilda: {
        projects: [
          { title: 'Dysmorphia', name: 'Hilda Landström Ferm' },
          { title: 'Material', name: 'Hilda Landström Ferm' },
          { title: 'An Elegant Playground', name: 'Eliot Axelsson' },
        ],
      },
    };

    const INTERVAL = 2000;

    const track = document.getElementById('slideshow-track');
    const origSlides = [...track.children];
    origSlides.forEach(s => track.appendChild(s.cloneNode(true)));

    let setWidth = 0;
    origSlides.forEach(s => { setWidth += s.getBoundingClientRect().width; });
    setWidth += origSlides.length * 16;
    track.style.setProperty('--set-width', setWidth + 'px');

    /* Hover via JS — bulletproof against transform-animation flicker */
    document.querySelectorAll('.slide-student').forEach(slide => {
      slide.addEventListener('mouseenter', () => slide.classList.add('is-hovered'));
      slide.addEventListener('mouseleave', () => slide.classList.remove('is-hovered'));
    });

    /* Student pagination */
    document.querySelectorAll('.slide-student').forEach(slide => {
      const key = slide.dataset.student;
      const data = STUDENTS[key];
      if (!data) return;

      const imgs = [...slide.querySelectorAll('.student-img')];
      const projectLabel = slide.querySelector('.label-project');
      const nameLabel = slide.querySelector('.label-name');
      let current = 0;

      imgs[0].style.opacity = '1';

      function showProject(idx) {
        current = idx;
        imgs.forEach((img, i) => {
          img.style.opacity = i === idx ? '1' : '0';
        });
        projectLabel.textContent = data.projects[idx].title;
        if (nameLabel) nameLabel.textContent = data.projects[idx].name;

        [...slide.querySelector('.label-dots').children].forEach((d, i) => {
          if (i === idx) {
            d.className = 'dot-bar is-active';
            d.innerHTML = '<span class="dot-fill"></span>';
          } else {
            d.className = 'dot';
            d.innerHTML = '';
          }
        });
      }

      setTimeout(() => {
        setInterval(() => {
          showProject((current + 1) % data.projects.length);
        }, INTERVAL);
      }, Math.random() * INTERVAL);
    });

    /* Compute exact translateX for shape card text hover (8px gap centered) */
    function computeShapeHovers() {
      document.querySelectorAll('.card-vk, .card-mode, .card-form').forEach(card => {
        const label = card.querySelector('.bracket-label, .oval-label');
        const hp = card.querySelector('.bracket-hp, .oval-hp');
        if (!label || !hp) return;

        const container = label.parentElement;
        const containerW = container.offsetWidth;
        const labelW = label.offsetWidth;
        const hpW = hp.offsetWidth;

        const totalContent = labelW + 8 + hpW;
        const leftOffset = (containerW - totalContent) / 2;
        const labelTarget = leftOffset;
        const hpTarget = containerW - leftOffset - hpW;

        const labelCurrent = label.offsetLeft;
        const hpCurrent = hp.offsetLeft;

        const labelDx = labelTarget - labelCurrent;
        const hpDx = hpTarget - hpCurrent;

        label.style.setProperty('--hover-dx', labelDx + 'px');
        hp.style.setProperty('--hover-dx', hpDx + 'px');
      });
    }

    computeShapeHovers();
    window.addEventListener('resize', computeShapeHovers);
  </script>
</body>
</html>
