<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beckmans Hero 2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="hero">

    <nav class="top-nav">
      <span class="brand nav-fixed">beckmans designhögskola</span>
      <span class="nav-link nav-fixed nav-form">form</span>
      <span class="nav-link nav-fixed nav-mode">mode</span>
      <span class="nav-link nav-fixed nav-vk">visuell kommunikation</span>
      <span class="nav-link nav-fixed nav-evening">kvällskolan</span>
      <span class="nav-link nav-fixed nav-apply">ansök</span>
    </nav>

    <div class="headlines">
      <span class="headline-left">här görs design.</span>
      <span class="headline-right">på riktigt.</span>
    </div>

    <div class="slideshow">
      <div class="slideshow-track" id="slideshow-track">
        <!-- Set 1 -->

        <!-- Item 1: Composite image 432x432 -->
        <div class="slide slide-large">
          <div class="slide-clip">
            <img class="img-base" src="assets/images/image-118.png" alt="" />
            <img class="img-overlay" src="assets/images/image-115.png" alt="" />
          </div>
          <div class="slide-label label-center-left">
            <div class="label-row">
              <div class="label-pad"></div>
              <div class="label-content"><span class="label-text">Eliot Axelsson</span></div>
              <div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div>
            </div>
            <div class="label-sep"></div>
            <div class="label-row">
              <div class="label-pad"></div>
              <div class="label-content"><span class="label-text">Psyk</span></div>
              <div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div>
            </div>
            <div class="label-sep"></div>
            <div class="label-row">
              <div class="label-pad"></div>
              <div class="label-content">
                <div class="label-dots">
                  <span class="dot"></span>
                  <span class="dot"></span>
                  <span class="dot-bar"><span class="dot-fill" style="width:33%"></span></span>
                </div>
              </div>
              <div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div>
            </div>
          </div>
        </div>

        <!-- Item 2: visuell kommunikation card 320x432 -->
        <div class="slide slide-small">
          <div class="card-top card-brackets">
            <img class="bracket bracket-left" src="assets/vectors/union-stroke-mirrored.svg" alt="" />
            <div class="bracket-text">
              <span class="bracket-label">visuell<br>kommunikation</span>
              <span class="bracket-hp">180hp</span>
            </div>
            <img class="bracket bracket-right" src="assets/vectors/union-stroke.svg" alt="" />
          </div>
          <div class="card-bottom">
            <img src="assets/images/image-127.png" alt="" />
          </div>
        </div>

        <!-- Item 3: Full image 320x432 -->
        <div class="slide slide-small slide-full-image">
          <img class="slide-img" src="assets/images/image-117.png" alt="" />
          <div class="slide-label label-bottom-left">
            <div class="label-row">
              <div class="label-pad"></div>
              <div class="label-content"><span class="label-text">Fanny Axnér</span></div>
              <div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div>
            </div>
            <div class="label-sep"></div>
            <div class="label-row">
              <div class="label-pad"></div>
              <div class="label-content"><span class="label-text">Trip stackable</span></div>
              <div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div>
            </div>
            <div class="label-sep"></div>
            <div class="label-row">
              <div class="label-pad"></div>
              <div class="label-content">
                <div class="label-dots">
                  <span class="dot"></span>
                  <span class="dot"></span>
                  <span class="dot-bar"><span class="dot-fill" style="width:33%"></span></span>
                </div>
              </div>
              <div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div>
            </div>
          </div>
        </div>

        <!-- Item 4: Ocean + oval card 320x432 -->
        <div class="slide slide-small">
          <div class="card-top card-image">
            <img src="assets/images/ocean-1.png" alt="" />
          </div>
          <div class="card-bottom card-oval">
            <img class="oval-bg" src="assets/vectors/union.svg" alt="" />
            <span class="oval-label">form</span>
            <span class="oval-hp">180hp</span>
          </div>
        </div>

        <!-- Item 5: Full image 432x432 -->
        <div class="slide slide-large slide-full-image">
          <img class="slide-img" src="assets/images/image-118.png" alt="" />
          <div class="slide-label label-top-left">
            <div class="label-row">
              <div class="label-pad"></div>
              <div class="label-content"><span class="label-text">Hilda Landström Ferm</span></div>
              <div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div>
            </div>
            <div class="label-sep"></div>
            <div class="label-row">
              <div class="label-pad"></div>
              <div class="label-content"><span class="label-text">Dysmorphia</span></div>
              <div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div>
            </div>
            <div class="label-sep"></div>
            <div class="label-row">
              <div class="label-pad"></div>
              <div class="label-content">
                <div class="label-dots">
                  <span class="dot"></span>
                  <span class="dot-bar"><span class="dot-fill" style="width:33%"></span></span>
                  <span class="dot"></span>
                </div>
              </div>
              <div class="label-cap"><img src="assets/vectors/ellipse-4.svg" alt="" /></div>
            </div>
          </div>
        </div>

        <!-- Item 6: Mode brackets card 320x432 -->
        <div class="slide slide-small card-mode">
          <div class="card-top card-brackets">
            <img class="bracket bracket-left" src="assets/vectors/subtract.svg" alt="" />
            <div class="bracket-text">
              <span class="bracket-label">mode</span>
              <span class="bracket-hp">180hp</span>
            </div>
            <img class="bracket bracket-right" src="assets/vectors/subtract.svg" alt="" />
          </div>
          <div class="card-bottom">
            <img src="assets/images/image-128.png" alt="" />
          </div>
        </div>

      </div>
    </div>

  </section>

  <script>
    const track = document.getElementById('slideshow-track');
    const slides = [...track.children];

    slides.forEach(s => track.appendChild(s.cloneNode(true)));

    let setWidth = 0;
    slides.forEach(s => { setWidth += s.offsetWidth + 16; });
    track.style.setProperty('--set-width', setWidth + 'px');
  </script>
</body>
</html>
